
<div class="main container p-4">
    <h2>Login</h2>

    <input
    [(ngModel)]="username"
    placeholder="Username"
    class="lg-text-input form-control">
    <br>
    <input
    type="password"
    [(ngModel)]="password"
    placeholder="Password"
    class="lg-text-input form-control">
    <br>
    <button
        class="btn "
        (click)="login()">
        Done
      </button>

</div>
