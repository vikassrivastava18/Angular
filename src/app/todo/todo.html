<div class="main">
  <h2>{{ componentTitle }}</h2>
  
  <label for="addItemInput">What would you like to do today?</label>
  <input 
    #newItem
    placeholder="add an item"
   newItem.value=""
    class="lg-text-input"
    id="addItemInput" />
    <button class="btn-primary" newItem.value=''>
      Add Item
    </button>
    <!-- Buttons that show all, still to do, or done items on click -->
     
    <div class="btn-wrapper">
      <button
        class="btn btn-menu"
        [class.active]="filter === 'all'"
        (click)="filter = 'all'">
        All
      </button>

      <button
        class="btn btn-menu"
        [class.active]="filter === 'active'"
        (click)="filter = 'active'">
        To Do
      </button>

      <button
        class="btn btn-menu"
        [class.active]="filter === 'done'"
        (click)="filter = 'done'">
        Done
      </button>
    </div>

  <h2>
  {{todoService.todos().length}}
  <span> @if (todoService.todos().length === 1) { item } @else { items } </span>
</h2>

<ul>
  @for (item of todoService.todos(); track item.id) {
  <li>
    <todo-item [item]="item"></todo-item>
  </li>
  }
</ul>
</div>
